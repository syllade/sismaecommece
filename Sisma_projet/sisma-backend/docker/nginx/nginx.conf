# Nginx Load Balancer Configuration
# For horizontal scaling with multiple app instances

upstream fashop_backend {
    # Least connections - route to server with fewest active connections
    least_conn;
    
    # App instance 1
    server fashop-app-1:8000 weight=5;
    
    # App instance 2 (add more as needed)
    server fashop-app-2:8000 weight=5;
    
    # App instance 3
    server fashop-app-3:8000 weight=5;
    
    # Health check backup
    server fashop-app-1:8000 backup;
    server fashop-app-2:8000 backup;
    server fashop-app-3: backup;
    
    # Keepalive connections to upstream
    keepalive 32;
}

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=3r/s;

server {
    listen 80;
    listen [::]:80;
    server_name _;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml application/json application/javascript 
               application/xml application/xml+rss text/javascript application/x-font-ttf 
               font/opentype image/svg+xml;
    gzip_disable "MSIE [1-6]\.";
    
    # Client body size
    client_max_body_size 20M;
    client_body_timeout 60s;
    
    # Rate limiting
    limit_req zone=api_limit burst=20 nodelay;
    
    # Health check endpoint
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
    
    # Readiness check
    location /ready {
        access_log off;
        proxy_pass http://fashop_backend;
        proxy_connect_timeout 2s;
        proxy_next_upstream error timeout http_502;
    }
    
    # Static assets - serve directly with caching
    location /storage/ {
        alias /var/www/storage/app/public/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff;
        
        # WebP support
        location ~* ^/storage/(.+)\.(jpg|jpeg|png|gif)$ {
            add_header Vary Accept;
            try_files $uri$webp_suffix $uri =404;
        }
    }
    
    # CDN proxy (optional - for CloudFlare/AWS CloudFront)
    location /cdn/ {
        proxy_pass https://cdn.fashop.com/;
        proxy_set_header Host cdn.fashop.com;
        proxy_cache_valid 200 1h;
        expires 1y;
    }
    
    # Main application proxy
    location / {
        proxy_pass http://fashop_backend;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        
        # Retry on failure
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 10s;
    }
    
    # WebSocket location for Pusher
    location /ws {
        proxy_pass http://fashop_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }
}
